run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - gocritic
    - gosec

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gosec:
    excludes:
      - G304

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
