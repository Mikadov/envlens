name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use a PAT (classic, scopes: repo + workflow) so that PRs and
          # tags Release Please creates trigger downstream workflows. The
          # default GITHUB_TOKEN is deliberately inert for cascading events
          # (anti-loop protection), which leaves required status checks
          # stuck on Release Please PRs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
