name: Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Enforce Conventional Commits types that Release Please understands.
          types: |
            feat
            fix
            chore
            docs
            test
            ci
            refactor
            perf
            build
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject must start with a lowercase letter and not end with a period.
