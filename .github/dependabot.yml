version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # v9+ of this action requires golangci-lint v2; the project config is
      # still v1 schema. Accept patch/minor bumps, gate major on a v2 migration.
      - dependency-name: "golangci/golangci-lint-action"
        update-types: ["version-update:semver-major"]
