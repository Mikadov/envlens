version: 2

project_name: envlens

before:
  hooks:
    - go mod tidy

builds:
  - id: envlens
    main: ./cmd/envlens
    binary: envlens
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: envlens
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      # Match type: and type(scope): forms (commitlint allows optional scope).
      - '^docs(\([^)]+\))?:'
      - '^test(\([^)]+\))?:'
      - '^chore(\([^)]+\))?:'
      - '^ci(\([^)]+\))?:'

release:
  draft: false
  prerelease: auto
